const vel=pos.map(()=>new THREE.Vector3());

function simulate(steps){
  for(let s=0;s<steps;s++){
    vel.forEach(v=>v.set(0,0,0));
    for(let i=0;i<N;i++){
      for(let j=i+1;j<N;j++){
        const diff=new THREE.Vector3().subVectors(pos[j],pos[i]);
        const actual=diff.length()+0.001;
        const sem=sdist(QS[i],QS[j])/MAX_SD;
        const target=0.4+sem*3.8;
        const force=(actual-target)*0.014;
        const f=diff.clone().normalize().multiplyScalar(force);
        vel[i].add(f);vel[j].sub(f);
      }
      vel[i].add(pos[i].clone().negate().multiplyScalar(0.003));
    }
    for(let i=0;i<N;i++){
      pos[i].add(vel[i]);
      if(pos[i].length()>5.5) pos[i].setLength(5.5);
    }
  }
}
simulate(320);

const sGeo=new THREE.SphereGeometry(1,8,8);
const meshes=[];
const group=new THREE.Group();
QS.forEach((q,i)=>{
  const opacity=q.silence?0.22:q.set===1?0.52:q.set===2?0.72:0.92;
  const mat=new THREE.MeshBasicMaterial({color:0xeeeedd,transparent:true,opacity});
  const r=q.silence?0.022:0.034;
  const mesh=new THREE.Mesh(sGeo,mat);
  mesh.scale.setScalar(r);
  mesh.position.copy(pos[i]);
  mesh.userData={idx:i,baseR:r};
  group.add(mesh);meshes.push(mesh);
});
scene.add(group);

const THRESHOLD=0.28;
const lineSegs=[];
for(let i=0;i<N;i++)
  for(let j=i+1;j<N;j++){
    const sem=sdist(QS[i],QS[j])/MAX_SD;
    if(sem>THRESHOLD) continue;
    lineSegs.push({i,j,closeness:1-(sem/THRESHOLD)});
  }

const BUCKETS=8;
const lineGroups=[];
for(let b=0;b<BUCKETS;b++){
  const minC=b/BUCKETS,maxC=(b+1)/BUCKETS;
  const segs=lineSegs.filter(s=>s.closeness>=minC&&s.closeness<maxC);
  if(!segs.length) continue;
  const lp=[];
  segs.forEach(s=>{lp.push(pos[s.i].x,pos[s.i].y,pos[s.i].z,pos[s.j].x,pos[s.j].y,pos[s.j].z);});
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(lp),3));
  const midC=(minC+maxC)/2;
  const mat=new THREE.LineBasicMaterial({color:0xccccbb,transparent:true,opacity:0.06+midC*0.46});
  const ls=new THREE.LineSegments(geo,mat);
  scene.add(ls);
  lineGroups.push({ls,segs,geo});
}

function computeCentroids(){
  const centroids=CNAMES.map(()=>new THREE.Vector3());
  const counts=new Array(CNAMES.length).fill(0);
  QS.forEach((q,i)=>{if(q.silence)return;centroids[q.cl].add(pos[i]);counts[q.cl]++;});
  centroids.forEach((c,i)=>{if(counts[i]>0)c.divideScalar(counts[i]);});
  return centroids;
}

function worldToScreen(v3){
  const v=v3.clone().project(camera);
  return {x:(v.x+1)/2*CW,y:(-v.y+1)/2*CH,z:v.z};
}

function drawLabels(){
  lctx.clearRect(0,0,CW,CH);
  const centroids=computeCentroids();
  centroids.forEach((c,i)=>{
    const outward=c.clone().normalize();
    const labelPos=c.clone().add(outward.clone().multiplyScalar(1.6));
    const s=worldToScreen(labelPos);
    if(s.z>=1) return;
    const name=CNAMES[i];
    lctx.save();
    lctx.font='500 11px -apple-system,sans-serif';
    lctx.textAlign='center';lctx.textBaseline='middle';
    const tw=lctx.measureText(name).width;
    lctx.fillStyle='rgba(10,10,9,0.85)';
    lctx.fillRect(s.x-tw/2-7,s.y-11,tw+14,22);
    lctx.fillStyle='rgba(224,221,210,0.85)';
    lctx.fillText(name,s.x,s.y);
    lctx.restore();
    const ns=worldToScreen(c);
    if(ns.z<1){
      lctx.beginPath();lctx.moveTo(ns.x,ns.y);lctx.lineTo(s.x,s.y);
      lctx.strokeStyle='rgba(224,221,210,0.2)';
      lctx.lineWidth=0.5;lctx.stroke();
    }
  });
}

let theta=0.4,phi=1.15,radius=12;
let isDragging=false,lastMX=0,lastMY=0;
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let hoveredIdx=-1,hoveredMesh=null,pinned=-1;

function updateCamera(){
  camera.position.set(
    radius*Math.sin(phi)*Math.sin(theta),
    radius*Math.cos(phi),
    radius*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(0,0,0);
}
updateCamera();

renderer.domElement.addEventListener('mousedown',e=>{isDragging=true;lastMX=e.clientX;lastMY=e.clientY;});
window.addEventListener('mouseup',()=>{isDragging=false;});
window.addEventListener('mousemove',e=>{
  if(isDragging){
    theta-=(e.clientX-lastMX)*0.005;
    phi=Math.max(0.15,Math.min(Math.PI-0.15,phi+(e.clientY-lastMY)*0.005));
    lastMX=e.clientX;lastMY=e.clientY;updateCamera();return;
  }
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(meshes);
  if(hits.length>0){
    const m=hits[0].object,idx=m.userData.idx;
    if(hoveredIdx!==idx){
      if(hoveredMesh&&hoveredIdx!==pinned)hoveredMesh.scale.setScalar(hoveredMesh.userData.baseR);
      hoveredIdx=idx;hoveredMesh=m;
      m.scale.setScalar(m.userData.baseR*2.6);
      const q=QS[idx]||meshes[idx].userData;
      document.getElementById('tip').textContent=q.silence?q.t:'\u201c'+(q.t||q.text)+'\u201d';
      document.getElementById('sub').textContent=q.silence?'silence \xb7 set '+q.set:q.visitor?'your question':CNAMES[q.cl]+' \xb7 set '+q.set;
    }
  } else {
    if(hoveredMesh&&hoveredIdx!==pinned){hoveredMesh.scale.setScalar(hoveredMesh.userData.baseR);hoveredMesh=null;}
    if(hoveredIdx!==-1&&hoveredIdx!==pinned){
      hoveredIdx=-1;
      document.getElementById('tip').textContent='hover any node to read the question';
      document.getElementById('sub').textContent='';
    }
  }
});
renderer.domElement.addEventListener('click',()=>{pinned=hoveredIdx>=0?(pinned===hoveredIdx?-1:hoveredIdx):-1;});
renderer.domElement.addEventListener('wheel',e=>{
  radius=Math.max(3,Math.min(22,radius+e.deltaY*0.012));updateCamera();
  e.preventDefault();
},{passive:false});

function recomputeZ(){
  for(let i=0;i<N;i++)pos[i].z=pos[i].z*0.3+(getZ(i)-0.5)*SPREAD*0.7;
  simulate(80);
  meshes.forEach((m,i)=>m.position.copy(pos[i]));
  lineGroups.forEach(({segs,geo})=>{
    const lp=geo.attributes.position.array;
    segs.forEach((s,k)=>{
      lp[k*6]=pos[s.i].x;lp[k*6+1]=pos[s.i].y;lp[k*6+2]=pos[s.i].z;
      lp[k*6+3]=pos[s.j].x;lp[k*6+4]=pos[s.j].y;lp[k*6+5]=pos[s.j].z;
    });
    geo.attributes.position.needsUpdate=true;
  });
}

document.querySelectorAll('.cb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.cb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');zMode=btn.dataset.z;recomputeZ();
  });
});

let autoRotate=true;
renderer.domElement.addEventListener('mousedown',()=>{autoRotate=false;});

window.addEventListener('resize',()=>{
  CW=mount.clientWidth;CH=mount.clientHeight;
  renderer.setSize(CW,CH);
  labelCanvas.width=CW;labelCanvas.height=CH;
  camera.aspect=CW/CH;
  camera.updateProjectionMatrix();
});

function animate(){
  requestAnimationFrame(animate);
  if(autoRotate){theta+=0.0005;updateCamera();}
  renderer.render(scene,camera);
  drawLabels();
}
animate();

const visitorQuestions=[];
const visitorMeshes=[];
const visitorLineGroup={segs:[],geo:null,ls:null};

function addVisitorNode(text,d){
  const targetZ=(getZ.length,zMode==='set'?1.0:zMode==='intensity'?Math.min(1,d.slice(0,6).reduce((a,b)=>a+b,0)/3):1-d[6]);
  const startPos=new THREE.Vector3(
    (Math.random()-0.5)*SPREAD*0.6,
    (Math.random()-0.5)*SPREAD*0.6,
    (targetZ-0.5)*SPREAD
  );
  pos.push(startPos.clone());
  vel.push(new THREE.Vector3());
  visitorQuestions.push({t:text,d,visitor:true});

  const mat=new THREE.MeshBasicMaterial({color:0xf5c97a,transparent:true,opacity:0.0});
  const r=0.042;
  const mesh=new THREE.Mesh(sGeo,mat);
  mesh.scale.setScalar(r);
  mesh.position.copy(startPos);
  mesh.userData={idx:pos.length-1,baseR:r,visitor:true,text,d};
  group.add(mesh);
  meshes.push(mesh);
  visitorMeshes.push(mesh);

  let opacity=0;
  const fadeIn=setInterval(()=>{
    opacity=Math.min(1,opacity+0.04);
    mat.opacity=opacity*0.92;
    if(opacity>=1) clearInterval(fadeIn);
  },30);

  simulate(120);
  meshes.forEach((m,i)=>{ if(i<pos.length) m.position.copy(pos[i]); });
  rebuildVisitorLines();
}

function rebuildVisitorLines(){
  if(visitorLineGroup.ls) scene.remove(visitorLineGroup.ls);
  const allQ=[...QS,...visitorQuestions];
  const segs=[];
  const vStart=QS.length;
  for(let vi=0;vi<visitorQuestions.length;vi++){
    const i=vStart+vi;
    const vd=visitorQuestions[vi].d;
    for(let j=0;j<QS.length+vi;j++){
      const jd=j<QS.length?QS[j].d:visitorQuestions[j-QS.length].d;
      const sem=Math.sqrt(vd.reduce((s,v,k)=>(s+(v-jd[k])**2),0))/MAX_SD;
      if(sem>THRESHOLD) continue;
      segs.push({i,j,closeness:1-(sem/THRESHOLD)});
    }
  }
  if(!segs.length) return;
  const lp=[];
  segs.forEach(s=>{
    lp.push(pos[s.i].x,pos[s.i].y,pos[s.i].z,pos[s.j].x,pos[s.j].y,pos[s.j].z);
  });
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(lp),3));
  const ls=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:0xf5c97a,transparent:true,opacity:0.22}));
  scene.add(ls);
  visitorLineGroup.ls=ls;visitorLineGroup.geo=geo;visitorLineGroup.segs=segs;
}

const qInput=document.getElementById('q-input');
const qSubmit=document.getElementById('q-submit');
const qStatus=document.getElementById('q-status');

async function handleQuestion(){
  const text=qInput.value.trim();
  if(!text||text.length<4) return;
  qSubmit.disabled=true;
  qStatus.textContent='reading the question...';
  try {
    const resp=await fetch('/api/score',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:text})
    });
    if(!resp.ok) throw new Error('api error');
    const {d}=await resp.json();
    qStatus.textContent='placing in field...';
    addVisitorNode(text,d);
    qInput.value='';
    setTimeout(()=>{ qStatus.textContent=''; },2000);
  } catch(e){
    qStatus.textContent='could not place — try again';
    setTimeout(()=>{ qStatus.textContent=''; },3000);
  }
  qSubmit.disabled=false;
}

qSubmit.addEventListener('click',handleQuestion);
qInput.addEventListener('keydown',e=>{ if(e.key==='Enter') handleQuestion(); });
</script>
